<body class="bg-slate-100 text-ink-800">

<!-- ===================== LOGIN ===================== -->
<div id="loginView" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="h-1.5 bg-brand-600"></div>
    <div class="bg-white px-8 pt-8 pb-4 border-b border-slate-100 text-center">
      <img id="logoLogin" alt="IBC Group" class="h-20 mx-auto object-contain">
      <p class="text-slate-400 text-sm mt-2">CRM comercial · dispositivos médicos LATAM</p>
    </div>
    <div class="p-8 space-y-4">
      <div>
        <label class="block text-sm font-medium text-ink-700 mb-1">Correo</label>
        <input id="liEmail" type="email" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none" placeholder="tucorreo@ibcgroupsac.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-ink-700 mb-1">Contraseña</label>
        <input id="liPass" type="password" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none" placeholder="••••••••">
      </div>
      <p id="liError" class="text-sm text-red-600" hidden></p>
      <button onclick="signIn()" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg py-2.5 transition">Entrar</button>
      <p class="text-xs text-slate-400 text-center">Los usuarios se crean desde Supabase → Authentication.</p>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="appView" hidden class="min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-60 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col fixed h-full z-20" id="sidebar">
    <div class="px-4 py-4 border-b border-slate-100 flex items-center justify-center">
      <img id="logoSide" alt="IBC Group" class="h-12 object-contain">
    </div>
    <div class="px-3 pt-3">
      <div class="rounded-lg bg-slate-50 border border-slate-200 px-3 py-2">
        <div class="text-[10px] uppercase tracking-wide text-slate-400">Módulo</div>
        <div class="text-sm font-bold text-ink-900" id="moduloBadge">—</div>
        <button onclick="cambiarModulo()" class="mt-1 text-xs text-brand-600 hover:underline">Cambiar módulo</button>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto p-3 space-y-1" id="navMenu"></nav>
    <div class="p-3 border-t border-slate-100">
      <div class="flex items-center gap-2 px-2 py-2">
        <div class="w-8 h-8 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center font-bold text-sm" id="userInitial">?</div>
        <div class="leading-tight min-w-0">
          <div class="text-sm font-semibold truncate" id="userName">—</div>
          <div class="text-xs text-slate-400" id="userRole">—</div>
        </div>
      </div>
      <button onclick="signOut()" class="w-full mt-1 text-sm text-slate-500 hover:text-red-600 py-1.5 rounded-lg hover:bg-slate-50 transition">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 ml-60 min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10">
      <h2 id="pageTitle" class="text-lg font-bold text-ink-900">Panel</h2>
      <div class="flex items-center gap-3">
        <button onclick="go('tareas')" title="Pendientes por vencer" class="relative p-2 rounded-lg hover:bg-slate-100">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="alertBadge" class="absolute -top-0.5 -right-0.5 bg-amber-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] px-1 flex items-center justify-center" hidden>0</span>
        </button>
      </div>
    </header>
    <section id="content" class="flex-1 p-6 overflow-y-auto"></section>
  </main>
</div>

const S = { user:null, perfil:null, route:'dashboard', modulo:null, tipoScope:null, cache:{} };
const isAdmin = () => S.perfil?.rol === 'administrador';
const $ = (id) => document.getElementById(id);
const esc = (s='') => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fdate = (d) => d ? new Date(d).toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}) : '';
const fdt = (d) => d ? new Date(d).toLocaleString('es-PE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';

function toast(msg, kind='ok'){
  const colors = {ok:'bg-emerald-600',err:'bg-red-600',info:'bg-brand-700'};
  const el = document.createElement('div');
  el.className = `${colors[kind]} text-white text-sm font-medium px-4 py-2.5 rounded-lg shadow-lg`;
  el.textContent = msg;
  $('toast').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
function openModal(html){ $('modalBox').className='bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[92vh] overflow-y-auto'; $('modalBox').innerHTML = html; $('modalHost').hidden = false; }
function setModalSize(cls){ const b=$('modalBox'); b.classList.remove('max-w-lg'); b.classList.add(cls); }
function previewToggle(editorId, wrapId, previewId, btn){
  const wrap=$(wrapId), prev=$(previewId);
  if(prev.hidden){ prev.innerHTML=getHtml(editorId); prev.hidden=false; wrap.hidden=true; btn.textContent='✏️ Editar'; }
  else { prev.hidden=true; wrap.hidden=false; btn.textContent='👁 Vista previa'; }
}
function closeModal(){ $('modalHost').hidden = true; $('modalBox').innerHTML=''; }
$('modalHost').addEventListener('click', e=>{ if(e.target.id==='modalHost') closeModal(); });

async function q(table){ return sb.from(table); }

// ============================================================
//  AUTENTICACIÓN
// ============================================================
async function signIn(){
  $('liError').hidden = true;
  const email = $('liEmail').value.trim(), password = $('liPass').value;
  if(!email||!password){ showLoginError('Ingresa correo y contraseña.'); return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ showLoginError('No se pudo entrar. Revisa tus datos.'); return; }
  await boot();
}
function showLoginError(m){ $('liError').textContent = m; $('liError').hidden = false; }
async function signOut(){ await sb.auth.signOut(); location.reload(); }

async function boot(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user){ $('loginView').hidden=false; $('appView').hidden=true; return; }
  S.user = user;
  let { data:perfil } = await sb.from('perfiles').select('*').eq('id', user.id).single();
  if(!perfil){ // por si el trigger no corrió
    await sb.from('perfiles').insert({ id:user.id, email:user.email, nombre:user.email });
    perfil = { id:user.id, email:user.email, nombre:user.email, rol:'operador' };
  }
  S.perfil = perfil;
  $('loginView').hidden=true; $('appView').hidden=false;
  $('userName').textContent = perfil.nombre || perfil.email;
  $('userRole').textContent = perfil.rol === 'administrador' ? 'Administrador' : 'Operador';
  $('userInitial').textContent = (perfil.nombre||perfil.email||'?').charAt(0).toUpperCase();
  showWelcome();
}

async function identidades(){

  return data||[];

function invalidate(){ S.cache = {}; }
// Trae TODAS las filas por páginas de 1000 (Supabase limita a 1000 por consulta)
async function fetchAll(tabla, columnas){
  let desde=0, paso=1000, todo=[];
  while(true){
    const { data, error } = await sb.from(tabla).select(columnas).range(desde, desde+paso-1);
    if(error || !data || !data.length) break;
    todo = todo.concat(data);
    if(data.length < paso) break;
    desde += paso;
  }
  return todo;
}

  const rec = {

async function loadDist(){
  const fid = $('d_filterFab')?.value, et = $('d_filterEtapa')?.value, s=($('d_search')?.value||'').toLowerCase();
  const pais = $('d_filterPais')?.value, orig = $('d_filterOrigen')?.value;
  let query = sb.from('distribuidores').select('*, fabricantes(nombre), contactos(count)').order('updated_at',{ascending:false});
  query = scopeMod(query);
  if(S.tipoScope) query = query.eq('tipo', S.tipoScope);
  if(fid) query = query.eq('fabricante_id', fid);
  if(et) query = query.eq('etapa', et);
  if(pais) query = query.eq('pais', pais);
  if(orig) query = query.eq('origen_detalle', orig);
  const { data } = await query;
  let rows = data||[];
  if(s) rows = rows.filter(r=>r.empresa.toLowerCase().includes(s));
  const etapaColor = {nuevo:'slate',contactado:'blue',interesado:'cyan',cotizado:'amber',negociacion:'violet',cerrado_ganado:'emerald',cerrado_perdido:'red'};
  $('distList').innerHTML = rows.length?`

        </thead>

          ${rows.map(r=>`<tr class="border-t border-slate-100 hover:bg-slate-50 cursor-pointer" onclick="distDetail('${r.id}')">
            <td class="px-4 py-3 font-medium text-ink-900">${esc(r.empresa)}</td>
            <td class="px-4 py-3 text-slate-500">${esc(r.fabricantes?.nombre||'')}</td>
            <td class="px-4 py-3 text-slate-500">${esc(r.pais||'')}</td>
            <td class="px-4 py-3"><span class="chip bg-${etapaColor[r.etapa]||'slate'}-100 text-${etapaColor[r.etapa]||'slate'}-700 capitalize">${r.etapa.replace('_',' ')}</span></td>

}

async function runImport(){
  const fid=$('imp_fab').value;
  const lines=$('imp_text').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ toast('Pega al menos una fila','err'); return; }
  let ok=0;
  for(const line of lines){
    const c=line.split(/\t|,/).map(x=>x.trim());
    const { data:d, error } = await sb.from('distribuidores').insert({ fabricante_id:fid, empresa:c[0], pais:c[1]||null, ciudad:c[2]||null, fuente:'manual' }).select().single();
    if(error||!d) continue;
    if(c[3]||c[4]) await sb.from('contactos').insert({ distribuidor_id:d.id, nombre:c[3]||'Contacto', email:c[4]||null, telefono:c[5]||null, es_principal:true });
    ok++;
  }
  toast(`${ok} distribuidor(es) importados`); closeModal(); loadDist();
}

async function runSend(id){
  const { dest, c } = S.cache.sendDest||{};
  if(!dest){ closeModal(); return; }
  closeModal();
  // 1) registrar envíos como pendientes + comunicación
  const envios = dest.map(d=>({ campana_id:id, contacto_id:d.id, distribuidor_id:d.distribuidor_id,
    identidad_correo_id:c.identidad_correo_id, email_destino:d.email, asunto:c.asunto, estado:'pendiente' }));
  await sb.from('envios_email').insert(envios);
  for(const d of dest){
    await sb.from('comunicaciones').insert({ distribuidor_id:d.distribuidor_id, contacto_id:d.id, tipo:'email',
      direccion:'saliente', asunto:c.asunto, contenido:'(Campaña: '+c.nombre+')', usuario_id:S.user.id, campana_id:id });
  }
  // 2) intentar el envío real vía función de Supabase
  try{
    const { data:res, error } = await sb.functions.invoke('swift-worker', { body:{ campana_id:id } });
    if(error) throw error;
    await sb.from('campanas').update({estado:'enviada'}).eq('id',id);
    await sb.from('envios_email').update({estado:'enviado', enviado_el:new Date().toISOString()}).eq('campana_id',id);
    toast(`Campaña enviada a ${dest.length} contacto(s)`);
  }catch(e){
    toast('Destinatarios registrados. El envío automático aún no está activado (falta configurar la función de correo).','info');
  }
  viewCampanas();
}

function parseDatosFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''});
        let start=0;
        if(rows.length){ const h=(rows[0][0]||'').toString().toLowerCase();
          if(['empresa','company','razón social','razon social','company name','nombre'].some(k=>h.includes(k))) start=1; }
        const recs=[];
        for(let i=start;i<rows.length;i++){
          const c=(rows[i]||[]).map(x=> x==null?'':x.toString().trim());
          if(!c[0]) continue;
          recs.push(DATTAB==='penta'
            ? {empresa:c[0],pais:c[1]||null,producto:c[2]||null,operacion:c[3]||null,importado_por:S.user.id}
            : {empresa:c[0],hs_code:c[1]||null,producto:c[2]||null,socio_comercial:c[3]||null,importado_por:S.user.id});
        }
        resolve(recs);
      }catch(err){ reject(err); }
    };
    reader.onerror=()=>reject(new Error('No se pudo leer el archivo'));
    reader.readAsArrayBuffer(file);
  });
}
async function runImportDatos(){
  const fi=$('dat_file');
  let recs=[];
  try{
    if(fi && fi.files && fi.files.length){
      recs = await parseDatosFile(fi.files[0]);
    } else {
      const lines=$('dat_text').value.split('\n').map(l=>l.trim()).filter(Boolean);
      recs=lines.map(l=>{const c=l.split(/\t|,/).map(x=>x.trim());
        return DATTAB==='penta'?{empresa:c[0],pais:c[1]||null,producto:c[2]||null,operacion:c[3]||null,importado_por:S.user.id}
          :{empresa:c[0],hs_code:c[1]||null,producto:c[2]||null,socio_comercial:c[3]||null,importado_por:S.user.id};});
    }
  }catch(err){ toast(err.message||'Error leyendo el archivo','err'); return; }
  if(!recs.length){ toast('Adjunta un archivo o pega al menos una fila','err'); return; }
  const { error } = await sb.from(DATTAB==='importyeti'?'datos_importyeti':'datos_penta').insert(recs);
  if(error){ toast(error.message,'err'); return; }
  toast(`${recs.length} registro(s) importados`); closeModal(); loadDatos();
}

async function genReport(){
  const from=$('rp_from').value, to=$('rp_to').value;
  if(!from||!to){ toast('Please select both dates','err'); return; }
  const out=$('rp_out'); if(!out) return;
  out.innerHTML='<div class="text-slate-400 text-sm py-6 text-center">Generating…</div>';
  try{
    const fromD=new Date(from+'T00:00:00'), toD=new Date(to+'T23:59:59');
    const inRange=t=>{ if(!t) return false; const x=new Date(t); return x>=fromD && x<=toD; };
    const tipoF=$('rp_tipo')?$('rp_tipo').value:'';
    const orgs=[...document.querySelectorAll('.rp_org:checked')].map(c=>c.value);
    let dist=await fetchAll('distribuidores','id,empresa,pais,tipo,etapa,fabricante_id,origen_detalle,created_at,updated_at');
    dist=(dist||[]).filter(d=> S.modulo==='mediplus'? d.fabricante_id===MODMID : d.fabricante_id!==MODMID);
    if(tipoF) dist=dist.filter(d=>d.tipo===tipoF);
    if(orgs.length) dist=dist.filter(d=>orgs.includes(d.origen_detalle));
    const dmap={}; dist.forEach(d=>dmap[d.id]=d);
    const nuevos=dist.filter(d=>inRange(d.created_at));
    const actualizados=dist.filter(d=>inRange(d.updated_at) && !inRange(d.created_at) && (!d.created_at || (new Date(d.updated_at)-new Date(d.created_at))>60000));
    const distIds=new Set(dist.map(d=>d.id));
    let comu=await fetchAll('comunicaciones','distribuidor_id,tipo,asunto,contenido,fecha');
    let notas=await fetchAll('distribuidor_notas','distribuidor_id,nota,fecha');
    const acts=[];
    (comu||[]).forEach(c=>{ if(!distIds.has(c.distribuidor_id)) return; const detail=((c.contenido&&c.contenido.trim())||(c.asunto&&c.asunto.trim())||''); if(!detail) return; acts.push({distId:c.distribuidor_id, date:c.fecha, type:'Email', detail}); });
    (notas||[]).forEach(n=>{ if(!distIds.has(n.distribuidor_id)) return; const detail=(n.nota&&n.nota.trim())||''; if(!detail) return; acts.push({distId:n.distribuidor_id, date:n.fecha, type:'Note', detail}); });
    const actsRange=acts.filter(a=>inRange(a.date));
    const lastByDist={};
    actsRange.forEach(a=>{ const p=lastByDist[a.distId]; if(!p || new Date(a.date)>new Date(p.date)) lastByDist[a.distId]=a; });
    const contacted=Object.keys(lastByDist).map(id=>({d:dmap[id], last:lastByDist[id]})).filter(x=>x.d);
    _reportData={from,to,modulo:moduloNombre(),nuevos,actualizados,contacted};
    const tipoLbl=t=> t==='distribuidor'?'Current Client':'Lead';
    const stageEn=e=>({nuevo:'New',contactado:'Contacted',interesado:'Interested',cotizado:'Quoted',negociacion:'In Negotiation',cerrado_ganado:'Closed-Won',cerrado_perdido:'Closed-Lost'}[e]||(e||''));
    const fmt=d=> d? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'2-digit'}):'';
    const sec=(title,rows,cols,mapper)=>`
      <div class="bg-white rounded-xl border border-slate-200 p-5 mb-4">
        <h4 class="font-bold text-ink-900 mb-3">${title} <span class="text-slate-400 font-normal">(${rows.length})</span></h4>
        ${rows.length?`<div class="overflow-auto"><table class="w-full text-sm"><thead class="text-xs uppercase text-slate-500 bg-slate-50"><tr>${cols.map(c=>`<th class="text-left px-3 py-2">${c}</th>`).join('')}</tr></thead><tbody>${rows.map(mapper).join('')}</tbody></table></div>`:'<p class="text-sm text-slate-400">No records in this period.</p>'}
      </div>`;
    out.innerHTML=`
      <div class="bg-brand-50 border border-brand-100 rounded-xl p-4 mb-4 text-sm text-ink-800">
        <b>${esc(moduloNombre())}</b> · Period: ${fmt(from)} — ${fmt(to)} · New: ${nuevos.length} · Updated: ${actualizados.length} · Contacted: ${contacted.length}
      </div>
      ${sec('New leads / clients added', nuevos, ['Company','Country','Type','Origin','Created'], d=>`<tr class="border-t border-slate-100"><td class="px-3 py-2 font-medium">${esc(d.empresa)}</td><td class="px-3 py-2 text-slate-500">${esc(d.pais||'')}</td><td class="px-3 py-2 text-slate-500">${tipoLbl(d.tipo)}</td><td class="px-3 py-2 text-slate-500">${esc(d.origen_detalle||'—')}</td><td class="px-3 py-2 text-slate-500">${fmt(d.created_at)}</td></tr>`)}
      ${sec('Updated leads / clients', actualizados, ['Company','Country','Stage','Origin','Updated'], d=>`<tr class="border-t border-slate-100"><td class="px-3 py-2 font-medium">${esc(d.empresa)}</td><td class="px-3 py-2 text-slate-500">${esc(d.pais||'')}</td><td class="px-3 py-2 text-slate-500">${esc(stageEn(d.etapa))}</td><td class="px-3 py-2 text-slate-500">${esc(d.origen_detalle||'—')}</td><td class="px-3 py-2 text-slate-500">${fmt(d.updated_at)}</td></tr>`)}
      ${sec('Contacted / updated — last activity', contacted, ['Company','Origin','Last activity','Type','Detail'], x=>`<tr class="border-t border-slate-100"><td class="px-3 py-2 font-medium">${esc(x.d.empresa)}</td><td class="px-3 py-2 text-slate-500">${esc(x.d.origen_detalle||'—')}</td><td class="px-3 py-2 text-slate-500">${fmt(x.last&&x.last.date)}</td><td class="px-3 py-2 text-slate-500">${esc((x.last&&x.last.type)||'')}</td><td class="px-3 py-2 text-slate-500">${esc(((x.last&&x.last.detail)||'').slice(0,200))}</td></tr>`)}`;
    $('rp_dl').disabled=false;
  }catch(err){
    out.innerHTML='<div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl p-4">Could not generate the report: '+esc(String(err&&err.message||err))+'</div>';
  }
}
function downloadReportPDF(){
  if(!_reportData){ toast('Generate the report first','err'); return; }
  if(!window.jspdf || !window.jspdf.jsPDF){ toast('PDF library not loaded (check your connection)','err'); return; }
  const { jsPDF }=window.jspdf; const doc=new jsPDF();
  const fmt=d=> d? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'2-digit'}):'';
  const tipoLbl=t=> t==='distribuidor'?'Current Client':'Lead';
  const stageEn=e=>({nuevo:'New',contactado:'Contacted',interesado:'Interested',cotizado:'Quoted',negociacion:'In Negotiation',cerrado_ganado:'Closed-Won',cerrado_perdido:'Closed-Lost'}[e]||(e||''));
  const headColor = S.modulo==='mediplus' ? [30,95,168] : [178,34,52];
  const R=_reportData;
  doc.setFontSize(16); doc.text('Activity Report — '+R.modulo, 14, 18);
  doc.setFontSize(10); doc.setTextColor(120);
  doc.text('Period: '+fmt(R.from)+' to '+fmt(R.to)+'    |    Generated: '+fmt(new Date()), 14, 25);
  doc.text('New: '+R.nuevos.length+'    Updated: '+R.actualizados.length+'    Contacted: '+R.contacted.length, 14, 31);
  doc.setTextColor(0);
  let y=38;
  const table=(title, head, body, colStyles)=>{
    if(y>260){ doc.addPage(); y=18; }
    doc.setFontSize(12); doc.text(title, 14, y);
    doc.autoTable({ startY:y+3, head:[head], body:body.length?body:[head.map(()=>'—')], styles:{fontSize:8, cellPadding:2, overflow:'linebreak'}, headStyles:{fillColor:headColor}, columnStyles:colStyles||{}, margin:{left:14,right:14} });
    y=doc.lastAutoTable.finalY+8;
  };
  table('New leads / clients added', ['Company','Country','Type','Origin','Created'], R.nuevos.map(d=>[d.empresa||'', d.pais||'', tipoLbl(d.tipo), d.origen_detalle||'—', fmt(d.created_at)]));
  table('Updated leads / clients', ['Company','Country','Stage','Origin','Updated'], R.actualizados.map(d=>[d.empresa||'', d.pais||'', stageEn(d.etapa), d.origen_detalle||'—', fmt(d.updated_at)]));
  table('Contacted / updated — last activity', ['Company','Origin','Last activity','Type','Detail'], R.contacted.map(x=>[x.d.empresa||'', x.d.origen_detalle||'—', fmt(x.last&&x.last.date), (x.last&&x.last.type)||'', ((x.last&&x.last.detail)||'').slice(0,300)]), {4:{cellWidth:65}});
  doc.save('report_'+R.modulo.replace(/\s+/g,'_')+'_'+R.from+'_to_'+R.to+'.pdf');
}

async function sincronizar(){
  const btn=$('b_syncBtn'); if(btn){btn.disabled=true; btn.textContent='Sincronizando…';}
  try{
    const { data, error } = await sb.functions.invoke('super-action', { body:{ max:30 } });
    if(error){
      let msg = error.message || 'Error';
      try{ const j = await error.context.json(); if(j?.error) msg = j.error; }catch(_){}
      throw new Error(msg);
    }
    if(data && data.ok===false) throw new Error(data.error||'Error');
    toast(`Listo: ${data?.nuevos||0} correo(s) nuevo(s) de ${data?.revisados||0} revisados`);
  }catch(e){
    console.error('sync error:', e);
    toast('No se pudo sincronizar: '+(e?.message||e), 'err');
  }
  if(btn){btn.disabled=false; btn.textContent='↻ Sincronizar';}
  loadBandeja();
}

// --- Editor de texto con formato ---
function richEditor(id, html='', minH=180, maxH=320){
  const fonts=['Arial','Georgia','Times New Roman','Courier New','Verdana','Tahoma'];

      <span class="w-px h-5 bg-slate-300 mx-1"></span>
      <button type="button" onmousedown="event.preventDefault()" onclick="rexec('${id}','insertUnorderedList')" class="w-8 h-8 rounded hover:bg-slate-200 text-sm">•</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="rlink('${id}')" class="w-8 h-8 rounded hover:bg-slate-200 text-sm" title="Enlace">🔗</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="rimg('${id}')" class="px-2 h-8 rounded hover:bg-slate-200 text-xs" title="Insertar imagen">🖼 Imagen</button>
    </div>
    <div id="${id}" contenteditable="true" class="px-3 py-2 overflow-y-auto text-sm focus:outline-none" style="min-height:${minH}px;max-height:${maxH}px">${html}</div>
  </div>`;
}
function rexec(id,cmd,val=null){ const el=$(id); if(el) el.focus(); document.execCommand(cmd,false,val); }
function rlink(id){ const url=prompt('Pega el enlace (URL):'); if(url) rexec(id,'createLink',url); }
async function rimg(id){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{ const f=inp.files[0]; if(!f) return; toast('Subiendo imagen…','info');
    const url=await subirArchivo(f); if(url){ rexec(id,'insertImage',url); } };
  inp.click();
}
function getHtml(id){ return $(id)?.innerHTML || ''; }

// --- Subir archivo a Supabase Storage ---
async function subirArchivo(file){
  const path = Date.now()+'_'+file.name.replace(/[^\w.\-]/g,'_');
  const { error } = await sb.storage.from('adjuntos').upload(path, file);
  if(error){ toast('No se pudo subir: '+error.message,'err'); return null; }
  const { data:pub } = sb.storage.from('adjuntos').getPublicUrl(path);
  return pub.publicUrl;
}

// --- Adjuntos ---
function pickAdjuntos(containerId){
  const inp=document.createElement('input'); inp.type='file'; inp.multiple=true;
  inp.onchange=async()=>{
    for(const f of inp.files){
      if(f.size > 8*1024*1024){ toast(`"${f.name}" supera 8 MB y no se adjuntó`,'err'); continue; }
      toast('Subiendo '+f.name+'…','info');
      const url=await subirArchivo(f);
      if(url) _adjuntos.push({ filename:f.name, url, contentType:f.type });
    }
    renderAdjuntos(containerId);
  };
  inp.click();
}
function renderAdjuntos(containerId){
  const c=$(containerId); if(!c) return;
  c.innerHTML=_adjuntos.map((a,i)=>`<span class="chip bg-slate-100 text-slate-700 inline-flex items-center gap-1">📎 ${esc(a.filename)} <button onclick="quitarAdjunto(${i},'${containerId}')" class="text-slate-400 hover:text-red-600 font-bold">✕</button></span>`).join('');
}
function quitarAdjunto(i,containerId){ _adjuntos.splice(i,1); renderAdjuntos(containerId); }

async function sendEmail(contactoId, distId){
  const sel=$('em_from'); const op=sel.selectedOptions[0];
  const from_email=op?.dataset.email, from_name=op?.dataset.nombre;
  const to=$('em_to').value.trim(), subject=$('em_subject').value.trim();
  const cc=$('em_cc').value.trim(), bcc=$('em_bcc').value.trim();
  const body_html=getHtml('em_body_rt');
  const adjuntos=_adjuntos.slice();
  if(!to){ toast('Falta el destinatario','err'); return; }
  closeModal();
  try{
    const { data, error } = await sb.functions.invoke('enviar-correo', { body:{ to, cc, bcc, from_email, from_name, subject, body_html, adjuntos } });
    if(error){ let m=error.message; try{const j=await error.context.json(); if(j?.error)m=j.error;}catch(_){} throw new Error(m); }
    if(data && data.ok===false) throw new Error(data.error||'Error');
    await sb.from('comunicaciones').insert({ distribuidor_id:distId||null, contacto_id:contactoId||null, tipo:'email', direccion:'saliente', asunto:subject, contenido:body_html.replace(/<[^>]+>/g,' '), usuario_id:S.user.id });
    await sb.from('envios_email').insert({ contacto_id:contactoId||null, distribuidor_id:distId||null, email_destino:to, asunto:subject, estado:'enviado', enviado_el:new Date().toISOString() });
    toast('Correo enviado');
  }catch(e){ toast('No se pudo enviar: '+(e?.message||e),'err'); }
}
async function replyCorreo(id){
  const { data:c } = await sb.from('correos').select('de_email,asunto,contacto_id,distribuidor_id,cuerpo').eq('id',id).single();
  composeEmail({
    to:c.de_email,
    subject:(/^re:/i.test(c.asunto||'')? c.asunto : 'Re: '+(c.asunto||'')),
    contacto_id:c.contacto_id, distribuidor_id:c.distribuidor_id,
    body:'\n\n----- Mensaje original -----\n'+(c.cuerpo||'')
  });
}

function field(label,id,val=''){ return `<label class="block text-sm font-medium text-ink-700">${label}<input id="${id}" value="${esc(val)}" class="w-full mt-1 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none"></label>`; }
function textarea(label,id,val='',rows=3){ return `<label class="block text-sm font-medium text-ink-700">${label}<textarea id="${id}" rows="${rows}" class="w-full mt-1 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 outline-none">${esc(val)}</textarea></label>`; }

$('liPass').addEventListener('keydown',e=>{ if(e.key==='Enter') signIn(); });
boot();
